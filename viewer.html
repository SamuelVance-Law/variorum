                const sy = ip.y + Math.sin(angle) * radius;
                const siglaHtml = w.sigla ? `<span class="sigla satellite-sigla">${escapeHtml(w.sigla)}</span>` : '';
                html += `<div class="endorser-satellite${engagedCls}" style="left:${sx}px;top:${sy}px;${colorStyle}" data-satellite-for="${w.id}">
                    <div class="satellite-name">${siglaHtml}${escapeHtml(e.endorser)}${e.date ? ` <span style="font-style:italic;color:var(--ink-soft);font-weight:normal;font-size:11px;">· ${escapeHtml(e.date)}</span>` : ''}</div>
                    <div class="satellite-reasoning">${escapeHtml(e.reasoning)}</div>
                </div>`;
            });
        });

        cruxes.forEach(crux => {
            const wordlevelPositions = crux.positions.filter(p => !p.witnessId);
            if (wordlevelPositions.length === 0) return;
            if (!crux.canvasPosition) return;
            const anchorPos = crux.canvasPosition;
            const outward = Math.atan2(anchorPos.y, anchorPos.x);
            const positionGap = 0.95;

            wordlevelPositions.forEach((pos, posIdx) => {
                if (!pos.endorsements || !pos.endorsements.length) return;
                const clusterAngle = outward + (posIdx - (wordlevelPositions.length - 1) / 2) * positionGap;
                const radius = 360;
                const spread = pos.endorsements.length > 3 ? 0.32 : 0.42;
                const posColor = positionColor(pos.id);
                const colorStyle = posColor ? ` border-left: 3px solid ${posColor};` : '';
                const tagStyle = posColor ? ` color: ${posColor}; border-right-color: ${posColor};` : '';

                pos.endorsements.forEach((e, i) => {
                    const angle = clusterAngle + (i - (pos.endorsements.length - 1) / 2) * spread;
                    const sx = anchorPos.x + Math.cos(angle) * radius;
                    const sy = anchorPos.y + Math.sin(angle) * radius;
                    html += `<div class="endorser-satellite position-satellite" style="left:${sx}px;top:${sy}px;${colorStyle}" data-position-satellite="${crux.id}-${pos.id}" data-crux-id="${crux.id}">
                        <div class="satellite-name"><span class="position-tag" style="${tagStyle}">${escapeHtml(pos.label)}</span>${escapeHtml(e.endorser)}${e.date ? ` <span style="font-style:italic;color:var(--ink-soft);font-weight:normal;font-size:11px;">· ${escapeHtml(e.date)}</span>` : ''}</div>
                        <div class="satellite-reasoning">${escapeHtml(e.reasoning)}</div>
                    </div>`;
                });
            });
        });

        return html;
    }

    function renderAboutPanel() {
        // Sigla list is now computed from witness data
        const siglaList = witnesses
            .filter(w => w.sigla && w.aboutPhrase)
            .map(w => `<span class="mono">${escapeHtml(w.sigla)}</span> for ${escapeHtml(w.aboutPhrase)}`)
            .join(', ');
        const workTitle = workData.work.title;
        const workAuthor = workData.work.author;
        return `<div class="about-panel" id="aboutPanel">
            <button class="about-close" id="aboutClose">×</button>
            <p>A <em>variorum</em> is a scholarly edition that preserves textual variants rather than choosing among them. The form has existed since the seventeenth century — Bentley's Horace, the Furness Shakespeares, R. W. Franklin's Dickinson — and has always rested on a quiet collective: editors weighing manuscript witnesses, prior editorial choices, scholarly arguments, and historical context. This prototype proposes to make that collective explicit.</p>

            <p>This variorum holds <em>${escapeHtml(workTitle)}</em>${workAuthor ? ` by ${escapeHtml(workAuthor)}` : ''}.</p>

            <p class="about-section-label">Four layers</p>
            <p><em>Manuscript</em> shows the primary witness — the textual ground from which the others depart — with the author's line breaks preserved. <em>Reading</em> adds a clean typeset copy with the foregrounded reading at full opacity and alternatives ghosted behind. <em>Variants</em> brings in the orbital cards — every documented witness, including letters and publications. <em>Voices</em> adds the endorsers around each card. Reading and editing are the same activity at different intensities.</p>

            <p class="about-section-label">Canonical and Personal views</p>
            <p>The toggle in the top-right switches between the editor's layout and your own. Canonical shows the variorum as the editor structured it. Personal lets you drag cards around, propose your own cruxes, and add positions. Toggling between them doesn't lose state — your arrangement and proposals persist hidden behind the canonical when you switch back.</p>

            <p class="about-section-label">Sigla</p>
            <p>Each card carries a single-letter sigla in the top-left: ${siglaList}.</p>

            <p class="about-section-label">Governance of cruxes</p>
            <p>A <em>crux</em> — a point where the text is contested — is the apparatus's basic unit. The seeded cruxes here were placed by the editor. But anyone can propose a new crux by clicking a word in the reading copy. Proposed cruxes have three states:</p>
            <p><em>Proposed</em>: just flagged by a reader, with one or more positions and a reasoning. Visible only in that reader's Personal view; doesn't clutter the Canonical apparatus.</p>
            <p><em>Recognized</em>: after three readers have endorsed it as a crux, it becomes visible in Canonical view at reduced weight — labelled "pending," italic, faded. The community has agreed there's something here worth attending to.</p>
            <p><em>Canonical</em>: once five readers have endorsed, it joins the full apparatus, indistinguishable from editor-defined cruxes.</p>
            <p>Endorsing a crux <em>as a crux</em> is separate from endorsing a position within it. To endorse a crux is to say "this question deserves our attention"; a reader can endorse a crux without yet having a position on the answer.</p>
            <p>The editor curates the initial corpus and the form of the apparatus, then steps back. The community recognises which cruxes graduate. The editor retains no override.</p>

            <p class="about-section-label">Adding to the apparatus</p>
            <p>Click any word in the reading copy to propose a new crux at that location. Double-click an empty area of the canvas at Layer 3 or 4 to add a new position to an existing stanza-level crux. Cards you've added show a "remove" affordance on hover, visible only to you. Your endorsements on others' cards can be withdrawn the same way.</p>

            <p class="about-section-label">Searching</p>
            <p>Press <span class="mono">/</span> or <span class="mono">⌘F</span> to search the variorum. The search reads what's currently on screen — text in the reading copy, witness cards, satellites, and the manuscript caption. Switching layers widens the search; engaging a card reveals its apparatus. Use <span class="mono">Enter</span> and <span class="mono">Shift+Enter</span> to cycle through matches; the viewport pans to centre each one.</p>

            <p class="about-section-label">What this is</p>
            <p>An open prototype, not a finished tool. The seeded scholars are fictional, given the kinds of arguments real scholars have made about this work. The thresholds and governance model are first drafts. Built to be argued with.</p>
        </div>`;
    }

    // ============================================================
    // SEARCH
    // A lightweight Cmd+F replacement. Walks the visible DOM at the
    // current layer, wraps matches in <mark> tags, lets the user cycle
    // through them with Enter / Shift+Enter, and pans the viewport to
    // center on the active match's containing card.
    //
    // Limitations:
    // - Searches only what's currently rendered. Content hidden behind
    //   layer state (e.g. satellites at Layer 4 when you're at Layer 1)
    //   or behind engagement (a witness's apparatus when not engaged) is
    //   not visited. Switch layers / engage a card to widen the search.
    // - Marks are wiped by any re-render. That's the right behavior —
    //   search results invalidate on canvas state change.
    // ============================================================
    let searchOpen = false;
    let searchMatches = [];  // array of <mark> DOM elements
    let searchActiveIdx = -1;
    const SEARCH_CONTAINERS = '.manuscript-card, .reading-copy, .card, .endorser-satellite';

    function openSearch() {
        searchOpen = true;
        const bar = document.getElementById('searchBar');
        const input = document.getElementById('searchInput');
        bar.classList.add('open');
        input.focus();
        input.select();
    }

    function closeSearch() {
        searchOpen = false;
        const bar = document.getElementById('searchBar');
        bar.classList.remove('open');
        document.getElementById('searchInput').value = '';
        clearSearchHighlights();
        searchMatches = [];
        searchActiveIdx = -1;
        updateSearchUI();
    }

    function clearSearchHighlights() {
        document.querySelectorAll('mark.search-match').forEach(mark => {
            const parent = mark.parentNode;
            if (!parent) return;
            parent.replaceChild(document.createTextNode(mark.textContent), mark);
            parent.normalize();  // merge adjacent text nodes back together
        });
    }

    function performSearch(query) {
        clearSearchHighlights();
        searchMatches = [];
        searchActiveIdx = -1;
        const q = (query || '').trim();
        if (!q) { updateSearchUI(); return; }
        const qLower = q.toLowerCase();

        document.querySelectorAll(SEARCH_CONTAINERS).forEach(container => {
            // Collect text nodes first; can't mutate while walking
            const walker = document.createTreeWalker(container, NodeFilter.SHOW_TEXT, {
                acceptNode(node) {
                    // Skip empty/whitespace-only nodes and nodes inside already-marked content
                    if (!node.nodeValue || !node.nodeValue.trim()) return NodeFilter.FILTER_REJECT;
                    if (node.parentNode && node.parentNode.tagName === 'MARK') return NodeFilter.FILTER_REJECT;
                    return NodeFilter.FILTER_ACCEPT;
                }
            });
            const nodes = [];
            let n;
            while ((n = walker.nextNode())) nodes.push(n);

            nodes.forEach(node => {
                const text = node.nodeValue;
                const lower = text.toLowerCase();
                let idx = lower.indexOf(qLower);
                if (idx === -1) return;

                // Build a fragment with all occurrences highlighted
                const frag = document.createDocumentFragment();
                let cursor = 0;
                while (idx !== -1) {
                    if (idx > cursor) {
                        frag.appendChild(document.createTextNode(text.substring(cursor, idx)));
                    }
                    const mark = document.createElement('mark');
                    mark.className = 'search-match';
                    mark.textContent = text.substring(idx, idx + q.length);
                    frag.appendChild(mark);
                    searchMatches.push(mark);
                    cursor = idx + q.length;
                    idx = lower.indexOf(qLower, cursor);
                }
                if (cursor < text.length) {
                    frag.appendChild(document.createTextNode(text.substring(cursor)));
                }
                node.parentNode.replaceChild(frag, node);
            });
        });

        if (searchMatches.length > 0) {
            searchActiveIdx = 0;
            activateMatch(0);
        }
        updateSearchUI();
    }

    function activateMatch(idx) {
        // Clear previous active state on all marks and containers
        document.querySelectorAll('mark.search-match.active').forEach(m => m.classList.remove('active'));
        document.querySelectorAll('.search-active-container').forEach(el => el.classList.remove('search-active-container'));
        if (idx < 0 || idx >= searchMatches.length) return;
        const mark = searchMatches[idx];
        mark.classList.add('active');
        // If the active match is inside a faded satellite, pop the satellite
        // so the match is actually readable.
        let parent = mark.parentElement;
        while (parent && parent !== document.body) {
            if (parent.classList && parent.classList.contains('endorser-satellite')) {
                parent.classList.add('search-active-container');
                break;
            }
            parent = parent.parentElement;
        }
        scrollToMatch(mark);
    }

    function nextMatch()  { if (searchMatches.length === 0) return; searchActiveIdx = (searchActiveIdx + 1) % searchMatches.length; activateMatch(searchActiveIdx); updateSearchUI(); }
    function prevMatch()  { if (searchMatches.length === 0) return; searchActiveIdx = (searchActiveIdx - 1 + searchMatches.length) % searchMatches.length; activateMatch(searchActiveIdx); updateSearchUI(); }

    function scrollToMatch(mark) {
        // Walk up to the nearest positioned canvas object (card / manuscript
        // / reading copy / satellite). Pan the viewport so that the object's
        // screen-space center lands at the viewport center.
        let el = mark;
        while (el && el !== document.body) {
            if (el.matches && el.matches('.manuscript-card, .reading-copy, .card, .endorser-satellite')) break;
            el = el.parentElement;
        }
        if (!el || el === document.body) return;
        const elRect = el.getBoundingClientRect();
        const elCenterX = elRect.left + elRect.width / 2;
        const elCenterY = elRect.top + elRect.height / 2;
        const vp = viewport.getBoundingClientRect();
        const vpCenterX = vp.left + vp.width / 2;
        const vpCenterY = vp.top + vp.height / 2;
        const dx = vpCenterX - elCenterX;
        const dy = vpCenterY - elCenterY;
        // animateTransform applies pan in screen coords too, so just add dx/dy
        animateTransform(panX + dx, panY + dy, zoom);
    }

    function updateSearchUI() {
        const countEl = document.getElementById('searchCount');
        const prev = document.getElementById('searchPrev');
        const next = document.getElementById('searchNext');
        const query = document.getElementById('searchInput').value.trim();
        if (!query) {
            countEl.textContent = '·';
            countEl.classList.add('empty');
        } else if (searchMatches.length === 0) {
            countEl.textContent = 'no matches';
            countEl.classList.add('empty');
        } else {
            countEl.textContent = `${searchActiveIdx + 1} / ${searchMatches.length}`;
            countEl.classList.remove('empty');
        }
        prev.disabled = searchMatches.length === 0;
        next.disabled = searchMatches.length === 0;
    }

    // ============================================================
    // HANDLERS
    // ============================================================
    function bindHandlers() {
        document.querySelectorAll('[data-witness]').forEach(el => {
            el.addEventListener('mousedown', e => {
                if (e.target.closest('.action-btn, .form-btn, .inline-form, [data-toggle-transcription]')) return;
                onCardMouseDown(e, el.dataset.witness);
            });
            el.addEventListener('click', e => {
                if (e.target.closest('.action-btn, .form-btn, .inline-form, [data-close-card], [data-toggle-transcription]')) return;
                if (justDragged) return;
                if (layer < 3 && el.dataset.witness !== workData.primaryWitnessId) return;
                if (layer < 2 && el.dataset.witness === workData.primaryWitnessId) return;
                const id = el.dataset.witness;
                engagedWitnessId = engagedWitnessId === id ? null : id;
                openFormFor = null;
                render();
            });
        });

        document.querySelectorAll('[data-toggle-transcription]').forEach(el => {
            el.addEventListener('click', e => {
                e.stopPropagation();
                transcriptionVisible = !transcriptionVisible;
                render();
            });
        });

        // Re-fit once the manuscript image finishes loading — the first autoFit
        // ran before the image had dimensions, so the card's measured height
        // was incomplete. After load, re-measure and re-center (only if we're
        // still on a layer where the manuscript card's height matters).
        document.querySelectorAll('.ms-image').forEach(img => {
            if (!img.complete) {
                img.addEventListener('load', () => {
                    if (layer === 1 || layer === 2) autoFit();
                }, { once: true });
            }
        });

        document.querySelectorAll('[data-close-card]').forEach(el => {
            el.addEventListener('click', e => {
                e.stopPropagation();
                engagedWitnessId = null; openFormFor = null;
                render();
            });
        });

        document.querySelectorAll('[data-endorse]').forEach(el => {
            el.addEventListener('click', e => {
                e.stopPropagation();
                identityNeeded = !window._identity;
                openFormFor = { witnessId: el.dataset.endorse };
                render();
                setTimeout(() => {
                    const focus = document.getElementById(identityNeeded ? 'identityInput' : 'endorseReasoning');
                    if (focus) focus.focus();
                }, 30);
            });
        });

        document.querySelectorAll('[data-cancel-form]').forEach(el => {
            el.addEventListener('click', e => {
                e.stopPropagation();
                openFormFor = null; render();
            });
        });

        document.querySelectorAll('[data-submit-endorse]').forEach(el => {
            el.addEventListener('click', e => {
                e.stopPropagation();
                submitEndorse(el.dataset.submitEndorse);
            });
        });

        const submitAdd = document.querySelector('[data-submit-add]');
        if (submitAdd) submitAdd.addEventListener('click', e => {
            e.stopPropagation();
            submitAddPosition();
        });
        const cancelAdd = document.querySelector('[data-cancel-add]');
        if (cancelAdd) cancelAdd.addEventListener('click', e => {
            e.stopPropagation();
            openFormFor = null;
            render();
        });

        const submitProposeCrux = document.querySelector('[data-submit-propose-crux]');
        if (submitProposeCrux) submitProposeCrux.addEventListener('click', e => {
            e.stopPropagation();
            submitProposeCruxAt();
        });

        // Witness-satellite hover: pop the whole group of satellites belonging
        // to the same witness, and highlight the parent card. On mouseleave,
        // preserve the popped state if the witness is currently engaged (it
        // was baked in at render time and should outlive transient hovers).
        document.querySelectorAll('.endorser-satellite[data-satellite-for]').forEach(satEl => {
            const witnessId = satEl.dataset.satelliteFor;
            satEl.addEventListener('mouseenter', () => {
                document.querySelectorAll(`.endorser-satellite[data-satellite-for="${witnessId}"]`).forEach(s => s.classList.add('related-active'));
                const card = document.querySelector(`[data-witness="${witnessId}"]`);
                if (card) card.classList.add('related-active');
            });
            satEl.addEventListener('mouseleave', () => {
                const card = document.querySelector(`[data-witness="${witnessId}"]`);
                if (card) card.classList.remove('related-active');
                if (witnessId === engagedWitnessId) return;  // engaged: stay popped
                document.querySelectorAll(`.endorser-satellite[data-satellite-for="${witnessId}"]`).forEach(s => s.classList.remove('related-active'));
            });
        });

        // Position-satellite hover: pop the whole crux cluster (every position
        // satellite belonging to the same crux). Position satellites are not
        // tied to a witness and have no engagement state, so this is pure hover.
        document.querySelectorAll('.endorser-satellite[data-crux-id]').forEach(satEl => {
            const cruxId = satEl.dataset.cruxId;
            satEl.addEventListener('mouseenter', () => {
                document.querySelectorAll(`.endorser-satellite[data-crux-id="${cruxId}"]`).forEach(s => s.classList.add('related-active'));
            });
            satEl.addEventListener('mouseleave', () => {
                document.querySelectorAll(`.endorser-satellite[data-crux-id="${cruxId}"]`).forEach(s => s.classList.remove('related-active'));
            });
        });

        // Witness-card hover: pop all satellites belonging to this witness.
        document.querySelectorAll('[data-witness]').forEach(card => {
            const witnessId = card.dataset.witness;
            card.addEventListener('mouseenter', () => {
                if (layer < 4) return;
                document.querySelectorAll(`.endorser-satellite[data-satellite-for="${witnessId}"]`).forEach(s => s.classList.add('related-active'));
            });
            card.addEventListener('mouseleave', () => {
                if (witnessId === engagedWitnessId) return;  // engaged: stay popped
                document.querySelectorAll(`.endorser-satellite[data-satellite-for="${witnessId}"]`).forEach(s => s.classList.remove('related-active'));
            });
        });

        document.querySelectorAll('.rc-word').forEach(el => {
            el.addEventListener('click', e => {
                e.stopPropagation();
                const stanzaId = el.dataset.stanza;
                const lineIdx = parseInt(el.dataset.line, 10);
                const word = el.dataset.word;
                if (!word) return;
                const rect = el.getBoundingClientRect();
                const FORM_WIDTH = 380;
                const FORM_HEIGHT = 300;
                const CHROME_BUFFER = 70;
                const vh = window.innerHeight;
                const vw = window.innerWidth;
                let screenX = rect.left + rect.width / 2;
                let screenY = rect.bottom + 28;
                if (screenY + FORM_HEIGHT > vh - 20) screenY = vh - FORM_HEIGHT - 20;
                if (screenY < CHROME_BUFFER) screenY = CHROME_BUFFER;
                if (screenX - FORM_WIDTH / 2 < 16) screenX = FORM_WIDTH / 2 + 16;
                if (screenX + FORM_WIDTH / 2 > vw - 16) screenX = vw - FORM_WIDTH / 2 - 16;
                openFormFor = {
                    type: 'propose-crux',
                    stanzaId, lineIdx, originalWord: word,
                    x: screenX, y: screenY
                };
                identityNeeded = !window._identity;
                engagedWitnessId = null;
                render();
                setTimeout(() => {
                    const focus = document.getElementById(identityNeeded ? 'identityInput' : 'cruxAlternative');
                    if (focus) focus.focus();
                }, 30);
            });
        });

        document.querySelectorAll('[data-remove-card]').forEach(el => {
            el.addEventListener('click', e => {
                e.stopPropagation();
                const id = el.dataset.removeCard;
                if (!confirm('Remove your proposed position? This cannot be undone.')) return;
                removeUserWitness(id);
            });
        });

        document.querySelectorAll('[data-withdraw-endorsement]').forEach(el => {
            el.addEventListener('click', e => {
                e.stopPropagation();
                const [witnessId, idxStr] = el.dataset.withdrawEndorsement.split('|');
                const idx = parseInt(idxStr);
                if (!confirm('Withdraw your endorsement?')) return;
                withdrawEndorsement(witnessId, idx);
            });
        });

        document.querySelectorAll('.tally-position').forEach(el => {
            el.addEventListener('click', e => {
                e.stopPropagation();
                const witnessId = el.dataset.witnessId;
                if (!witnessId) {
                    if (layer < 4) setLayer(4);
                } else {
                    if (layer < 3) setLayer(3);
                    engagedWitnessId = witnessId;
                }
                openFormFor = null;
                render();
            });
        });

        document.querySelectorAll('[data-crux]').forEach(el => {
            el.addEventListener('click', e => {
                e.stopPropagation();
                const cruxId = el.dataset.crux;
                const crux = getCrux(cruxId);
                if (!crux) return;
                if (crux.location === 'stanza') {
                    if (layer < 3) setLayer(3);
                    const witnessPositions = crux.positions.filter(p => p.witnessId).map(p => p.witnessId);
                    if (witnessPositions.length) {
                        const idx = witnessPositions.indexOf(engagedWitnessId);
                        engagedWitnessId = witnessPositions[(idx + 1) % witnessPositions.length];
                    }
                } else {
                    // Inline crux: no card → jump to Layer 4 satellites
                    if (layer < 4) setLayer(4);
                }
                openFormFor = null;
                render();
            });
        });
    }

    function showFormError(msg) {
        const e = document.getElementById('formError');
        if (!e) return;
        e.textContent = msg; e.classList.remove('hidden');
    }

    function submitEndorse(witnessId) {
        if (identityNeeded) {
            const id = document.getElementById('identityInput').value.trim();
            if (!id) return showFormError('Please enter your scholarly identity.');
            window._identity = id;
            identityNeeded = false;
        }
        const reasoning = document.getElementById('endorseReasoning').value.trim();
        if (!reasoning) return showFormError('An endorsement requires reasoning. The variorum holds reasoned readings, not bare votes.');
        getWitness(witnessId).apparatus.endorsements.push({
            endorser: window._identity,
            reasoning: reasoning
        });
        openFormFor = null;
        savePersistedState();
        render();
    }

    // ============================================================
    // CHROME — layer control, help, keyboard shortcuts
    // ============================================================
    document.querySelectorAll('.layer-btn').forEach(b => {
        b.addEventListener('click', () => setLayer(parseInt(b.dataset.layer)));
    });

    document.addEventListener('keydown', e => {
        // Search: Cmd/Ctrl+F always opens (overrides browser find).
        if ((e.metaKey || e.ctrlKey) && (e.key === 'f' || e.key === 'F')) {
            e.preventDefault();
            openSearch();
            return;
        }
        // Escape: if search is open, close it first (regardless of focus).
        if (e.key === 'Escape' && searchOpen) {
            e.preventDefault();
            closeSearch();
            return;
        }
        // All other shortcuts: ignore when typing in inputs.
        if (e.target.matches('input, textarea')) return;
        // / opens search (when not typing).
        if (e.key === '/') {
            e.preventDefault();
            openSearch();
            return;
        }
        if (e.key >= '1' && e.key <= '4') {
            setLayer(parseInt(e.key));
        } else if (e.key === '=' || e.key === '+') {
            zoomBy(1.2);
        } else if (e.key === '-' || e.key === '_') {
            zoomBy(1/1.2);
        } else if (e.key === '0') {
            autoFit();
        } else if (e.key === 'Escape') {
            if (aboutOpen) {
                aboutOpen = false;
                const p = document.getElementById('aboutPanel');
                if (p) p.remove();
            } else if (openFormFor) {
                openFormFor = null;
                render();
            } else if (engagedWitnessId) {
                engagedWitnessId = null;
                render();
            }
        }
    });

    // Search input + buttons (one-time wiring, since these live outside the canvas)
    const searchInput = document.getElementById('searchInput');
    let searchDebounce;
    searchInput.addEventListener('input', () => {
        // Light debounce so typing doesn't churn the DOM
        clearTimeout(searchDebounce);
        searchDebounce = setTimeout(() => performSearch(searchInput.value), 80);
    });
    searchInput.addEventListener('keydown', e => {
        if (e.key === 'Enter') {
            e.preventDefault();
            if (e.shiftKey) prevMatch(); else nextMatch();
        } else if (e.key === 'ArrowDown') {
            e.preventDefault(); nextMatch();
        } else if (e.key === 'ArrowUp') {
            e.preventDefault(); prevMatch();
        }
    });
    document.getElementById('searchPrev').addEventListener('click', () => { prevMatch(); searchInput.focus(); });
    document.getElementById('searchNext').addEventListener('click', () => { nextMatch(); searchInput.focus(); });
    document.getElementById('searchClose').addEventListener('click', closeSearch);

    document.getElementById('helpBtn').addEventListener('click', () => {
        aboutOpen = !aboutOpen;
        const existing = document.getElementById('aboutPanel');
        if (existing) existing.remove();
        if (aboutOpen) {
            document.body.insertAdjacentHTML('beforeend', renderAboutPanel());
            document.getElementById('aboutClose').addEventListener('click', () => {
                aboutOpen = false;
                document.getElementById('aboutPanel').remove();
            });
        }
    });

    document.querySelectorAll('.view-btn').forEach(b => {
        b.addEventListener('click', () => setViewMode(b.dataset.view));
    });
    document.getElementById('viewReset').addEventListener('click', () => {
        resetPersonal();
    });

    // ============================================================
    // BOOT
    // ============================================================
    document.getElementById('loadState').remove();
    document.getElementById('chromeNav').classList.remove('hidden');
    document.getElementById('viewport').classList.remove('hidden');

    migrateV1IfNeeded();
    loadPersistedState();
    document.querySelector('[data-layer="1"]').classList.add('active');
    document.querySelectorAll('.view-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.view === viewMode);
    });
    document.body.classList.toggle('personal-mode', viewMode === 'personal');
    if (viewMode === 'personal' && Object.keys(personalPositions).length > 0) {
        document.getElementById('viewReset').classList.remove('hidden');
    }
    render();
    setTimeout(() => autoFit(), 100);
    setTimeout(() => autoFit(), 600);

    let resizeTimer;
    window.addEventListener('resize', () => {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(() => autoFit(), 200);
    });

})();
</script>
